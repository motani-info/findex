                        - generic [ref=e324]:
                          - generic [ref=e326] [cursor=pointer]:
                            - paragraph [ref=e327]: 有価証券報告書レビュー及び大量保有報告書等のレビューについて（2026年度）
                            - link [ref=e328]:
                              - /url: "#"
                          - generic [ref=e329]:
                            - text: 2026年４月28日に、金融庁は、2026年度における有価証券報告書レビュー及び大量保有報告書等のレビューに関する公表を行いました。詳細は、以下の金融庁のページをご参照ください。
                            - text: https://www.fsa.go.jp/news/r7/sonota/20260327.html
                            - text: なお、有価証券報告書レビューについては、所管の財務局等から原則として提出者用 EDINET に登録されている事務連絡者情報の E-mail アドレス宛に連絡する予定ですが、スケジュール等の詳細については上記のリンク先の「別紙３」をご確認ください。
                            - list
                        - generic [ref=e330]:
                          - generic [ref=e332] [cursor=pointer]:
                            - paragraph [ref=e333]: EDINETウェブサイトで公開している情報の利用について
                            - link [ref=e334]:
                              - /url: "#"
                          - generic [ref=e335]:
                            - text: EDINETウェブサイトをご利用の際は、名称等が類似するウェブサイトとの混同にご注意ください。
                            - text: EDINETウェブサイトで公開している情報（以下「本コンテンツ」といいます。）については、利用規約をご確認の上、ご利用ください。
                            - text: 金融庁は、本コンテンツについて、EDINETウェブサイト以外で有償・無償を問わず情報提供を行っていません。
                            - text: 本コンテンツをご利用の際は、情報の取得元をご確認いただく等、十分ご留意ください。
                            - list
                        - generic [ref=e336]:
                          - generic [ref=e338] [cursor=pointer]:
                            - paragraph [ref=e339]: 閲覧サイトおよびEDINET APIの利用環境について
                            - link [ref=e340]:
                              - /url: "#"
                          - generic [ref=e341]:
                            - text: 閲覧サイトおよびEDINET APIをご利用する際は、製品サポートが継続しているOSやブラウザ等をご利用ください。
                            - text: 製品サポートのないOSやブラウザ等では、閲覧サイトおよびEDINET APIをご利用できない場合があります。
                            - text: 詳細は、利用環境およびEDINET API仕様書（Version2）をご確認ください。
                            - list
                        - generic [ref=e342]:
                          - generic [ref=e344] [cursor=pointer]:
                            - paragraph [ref=e345]: 書類の目次範囲を指定した全文検索における留意点（目次項目の変更及び削除）
                            - link [ref=e346]:
                              - /url: "#"
                          - generic [ref=e347]:
                            - text: 書類の目次範囲を指定した全文検索を利用する際に指定することとなる目次項目は、通常、最新の書類の目次項目となっています。
                            - text: そのため、提出された書類について、法令改正等により書類の目次項目の変更及び削除が行われた場合は変更前や削除前の目次項目がなく、当該目次項目を指定できないため、当該目次項目に記載された内容を検索する際は、「書類閲覧操作ガイド」の「2 章 有価証券報告書等の検索の4-1 全文検索条件指定時の留意点」をご参照のうえ検索してください。
                            - list
                        - generic [ref=e348]:
                          - generic [ref=e350] [cursor=pointer]:
                            - paragraph [ref=e351]: EDINET APIの利用にかかるご案内
                            - link [ref=e352]:
                              - /url: "#"
                          - generic [ref=e353]:
                            - text: EDINET APIのご利用には、以下のURLから登録及びAPIキーの発行が必要です。
                            - text: https://api.edinet-fsa.go.jp/api/auth/index.aspx?mode=1
                            - text: また、登録画面の表示には、「https://api.edinet-fsa.go.jp/」のポップアップブロック許可の設定が必要です。
                            - text: 詳しくはトップメニューの「操作ガイド等」に掲載している「EDINET API仕様書 (Version 2)」の「2-2ポップアップ許可サイトへの追加」をご覧ください。
                            - list
                        - generic [ref=e354]:
                          - generic [ref=e356] [cursor=pointer]:
                            - paragraph [ref=e357]: 「記述情報の開示の好事例集2025」の最終版公表
                            - link [ref=e358]:
                              - /url: "#"
                          - generic [ref=e359]:
                            - text: 金融庁では、有価証券報告書の開示の充実に向けた実務の積上げ・浸透を図る取組として、2018年から毎年度、「記述情報の開示の好事例に関する勉強会」（以下「勉強会」）を実施した上で、「記述情報の開示の好事例集」（以下「好事例集」）を公表しています。
                            - text: 先般、第１回勉強会（テーマ：全般的要求事項、気候変動関連）、第２回勉強会（テーマ：人的資本、従業員の状況、その他個別テーマ）でご議論いただいた内容を踏まえて、「記述情報の開示の好事例集2025（サステナビリティ情報の開示）」を取りまとめ、2025年12月25日に公表いたしました。
                            - text: 今般、第３回勉強会（テーマ：MD＆A、事業等のリスク）、第４回勉強会（テーマ：重要な契約等、コーポレート・ガバナンスの状況等）でご議論いただいた内容を踏まえて、「各テーマの開示例」及び「投資家・アナリスト・有識者が期待する主な開示のポイント」を追加・更新し、「記述情報の開示の好事例集2025」の最終版として取りまとめましたので、公表いたします。
                            - text: 〇「記述情報の開示の好事例集2025」（2026年３月27日）
                            - text: https://www.fsa.go.jp/news/r7/singi/20260327.html
                            - text: また、以下のページでは、「解説動画」や過去の「記述情報の開示の好事例集」等も掲載していますので、併せてご参照ください。
                            - text: 〇「企業情報の開示に関する情報（記述情報の充実）」
                            - text: https://www.fsa.go.jp/policy/kaiji/kaiji.html
                            - list
                        - generic [ref=e360]:
                          - generic [ref=e362] [cursor=pointer]:
                            - paragraph [ref=e363]: 有価証券報告書の作成・提出に際しての留意すべき事項について
                            - link [ref=e364]:
                              - /url: "#"
                          - generic [ref=e365]:
                            - text: 2026年３月27日に、金融庁は、2025年度の有価証券報告書レビューの結果等を踏まえて、有価証券報告書の作成・提出に際しての留意すべき事項等（識別された課題への対応にあたって参考となる開示例集を含む。）を公表しました。詳細は、以下の金融庁のページをご参照ください。
                            - text: https://www.fsa.go.jp/news/r7/sonota/20260327.html
                            - list
                        - generic [ref=e366]:
                          - generic [ref=e368] [cursor=pointer]:
                            - paragraph [ref=e369]: 注意（未公開株、ファンド等の取引について）
                            - link [ref=e370]:
                              - /url: "#"
                          - generic [ref=e371]:
                            - text: ●「未公開株」「私募債」「ファンド（組合など）」の証券の取引に関してトラブルが発生しており、また、「EDINETに証券の情報を開示しているので安心である。」、「財務局受理印が押されているので安心である。」といった違法的な勧誘が行われているとの情報が寄せられています。
                            - text: ●金融庁・財務局はEDINETに開示している情報について、
                            - text: ①開示内容について真実・正確と認定すること
                            - text: ②開示内容に投資判断上の重要な事項の記載が欠けていないと認定すること
                            - text: ③開示している有価証券の価値を保証・承認すること
                            - text: は一切ありませんので、くれぐれも御注意ください。
                            - text: ●なお、有価証券の取引に関し、上記①～③のような表示を行うことは、法により禁止されておりますので、御注意ください。
                            - list
                        - generic [ref=e372]:
                          - generic [ref=e374] [cursor=pointer]:
                            - paragraph [ref=e375]: お知らせ一覧について
                            - link [ref=e376]:
