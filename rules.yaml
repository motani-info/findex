# findex スコアリングルール定義（v4）
#
# 【スコアリング方式】
#   生スコア  = min(10, 値 / threshold × 10)   direction: high
#             = min(10, threshold / 値 × 10)   direction: low
#
# 【キャップ設計】
#   upper_cap  : direction=high 専用。閾値超で満点プラトー、cap超でペナルティ下降
#                用途: 配当利回りの「利回りの罠」対策
#   penalty_cap: direction=low  専用。値 ≥ cap で一律0点（ハズレ値の強制排除）
#   加重スコア = 生スコア × weight
#   合計      = Σ(加重スコア) / Σ(max_score×weight) × 100  ← 分母は動的（下記）
#
# 【Nullポリシー（status_based・D4 §1）】★v3からの最重要変更★
#   旧: データ取得不可(None)→生スコア0・分母に残す（薄いデータ銘柄を不当に減点）
#   新: derive層が出す status を見て採点する。
#     ok          → 通常採点（分子・分母に算入）
#     zero_legit  → 正当な0（実値）として0点で採点（分子0・分母に算入＝実力）
#     missing     → 分子・分母の両方から除外（持っていないデータで罰しない）
#     insufficient→ 分子・分母の両方から除外（期間不足・構造的に不能）
#     censored    → N+表示。裸の数字で採点しない＝分子・分母から除外
#   → 分母は銘柄ごとに「測れた指標」だけで動的に決まる。
#     「薄いデータで高得点」を防ぐのはスコアでなく claim別グレード の役目（score×grade で判断）。
#
# 【YoC質ゲート（D4.5 較正①）】
#   yield_on_cost_5y の生スコアに増配の質を掛ける（新指標を増やさず質補正）:
#     sound（EPS牽引）×1.0 / payout_driven（性向拡大依存）×0.5 / cyclical（一過性/赤字）×0.3
#   dividend_quality が insufficient/None のときは ×1.0（質補正なし＝中立）。
#
# 【業種相対（D4.5 較正③）】
#   operating_margin は scoring: sector_relative。sector33内のパーセンタイル順位×10。
#   業種内の有効社数が min_sector_n 未満なら絶対閾値にフォールバック（暴走防止に絶対フロア併用）。
#
# 【重み設計思想】 配当継続性 > 配当余力 > 事業の質 > 割安度
#
# 【v4 改訂方針 2026-06-14（D4.5）】
#   ① 10年増配CAGR廃止 → YoC（取得利回り5年・質ゲート付）新設 ＋ DOE新設
#   ② 自己資本比率 80%→70%・ROE 20%→15%（実測分布で上位25%水準に較正）
#   ③ 営業利益率を業種相対スコア化（低マージン業種の不当な0点を是正）
#   ※ 重み配分は旧PJ継承の手づけ。前方アウトカム較正は D8 バックテスト（→v5）。

version_tag: v4

# 銘柄分類（動的入れ替え）
classification:
  large_cap_threshold: 1000000000000   # 1兆円
  financial_sectors: ["銀行業", "保険業", "証券、商品先物取引業", "その他金融業"]

# 業種相対スコアの最小母数（これ未満は絶対閾値にフォールバック）
min_sector_n: 4

rules:

  # ── カテゴリー1: 配当の安定性 ──────────────────────────────────
  - name: 連続非減配年数
    field: consecutive_no_cut_years
    direction: high
    threshold: 17       # 17年以上で満点（リーマン・コロナ耐性）
    max_score: 10
    weight: 2.5         # 【最重要】配当継続性の核心
    available: true

  - name: 連続増配年数
    field: consecutive_dividend_growth_years
    direction: high
    threshold: 17
    max_score: 10
    weight: 1.5         # 経営陣の能動的な増配コミットメント
    available: true

  - name: 減配信頼性スコア
    field: dividend_reliability
    direction: high
    threshold: 1.0      # 1.0=過去20年無減配、0.6=1回、0.0=2回以上
    max_score: 10
    weight: 0.8         # consecutive_no_cut_years と概念重複・補完的
    available: true

  # ── カテゴリー2: 増配実績・余力 ──────────────────────────────
  - name: 取得利回り（YoC・5年）
    field: yield_on_cost_5y
    direction: high
    threshold: 0.06     # 5年前株価ベースの利回り6%で満点（低ベースノイズを自動抑制）
    max_score: 10
    weight: 1.2         # 10年増配CAGRを置換。増配の質ゲートを掛ける（上記）
    available: true
    quality_gate: true  # dividend_quality で ×1.0/0.5/0.3

  - name: DOE（自己資本配当率）
    field: doe
    direction: high
    threshold: 0.08     # =年間配当総額÷自己資本。8%で満点（=ROE×配当性向）
    max_score: 10
    weight: 0.8         # 利益が振れても自己資本は安定→持続性シグナル
    available: true

  - name: 予想配当性向
    field: payout_ratio
    direction: low
    threshold: 0.35     # 35%以下で満点（利益半減でも無配にならない水準）
    penalty_cap: 1.0    # 100%以上（配当が利益超）は一律0点
    max_score: 10
    weight: 2.0         # 配当余力の最重要指標
    available: true

  - name: FCF配当カバレッジ
    field: fcf_payout_coverage
    direction: high
    threshold: 2.0      # FCFが配当総額の2倍以上で満点
    max_score: 10
    weight: 1.0         # 配当性向の現金ベース補完
    available: true

  # ── カテゴリー3: 成長性（配当原資の確認）─────────────────────
  - name: EPS成長率（5年CAGR）
    field: eps_growth_5y
    direction: high
    threshold: 0.15     # 15%以上で満点
    max_score: 10
    weight: 1.0
    available: true

  - name: 売上高5年CAGR
    field: revenue_growth_5y_cagr
    direction: high
    threshold: 0.07     # 7%以上で満点（名目GDP成長の2〜3倍）
    max_score: 10
    weight: 1.0
    available: true

  # ── カテゴリー4: 財務健全性 ───────────────────────────────────
  - name: 自己資本比率
    field: equity_ratio
    direction: high
    threshold: 0.70     # 【v4】80%→70%（上位約25%水準。80%超は資本非効率）
    max_score: 10
    weight: 1.5
    available: true

  # ── カテゴリー5: 競争優位性・収益性 ──────────────────────────
  - name: ROE（自己資本利益率）
    field: roe
    direction: high
    threshold: 0.15     # 【v4】20%→15%（上位約25%水準）
    max_score: 10
    weight: 1.5
    available: true

  - name: 営業利益率
    field: operating_margin
    direction: high
    threshold: 0.20     # 絶対フォールバック用（業種母数不足時）
    max_score: 10
    weight: 1.0
    available: true
    scoring: sector_relative   # 【v4】sector33内パーセンタイル×10（絶対フロア併用）

  - name: ROIC-WACC
    field: roic_minus_wacc
    direction: high
    threshold: 0.10     # 10%以上で満点（超過リターン）
    max_score: 10
    weight: 0.8         # 有効率低めだが beta+cost_of_debt 回復で改善
    available: true

  # ── カテゴリー6: 割安度 ────────────────────────────────────────
  - name: 配当利回り
    field: div_yield
    direction: high
    threshold: 0.030    # 3.0%以上で満点ゾーン開始
    upper_cap: 0.070    # 7.0%超でペナルティ開始（利回りの罠）
    max_score: 10
    weight: 1.2
    available: true

  - name: ネットキャッシュPER（実質PER）
    field: net_cash_per
    direction: low
    threshold: 10.0     # 10倍以下で満点
    penalty_cap: 60.0   # 60倍以上は一律0点
    max_score: 10
    weight: 1.5         # 割安度の主指標
    available: true

  # ── 代替指標: 大型株・金融株向け ─────────────────────────────
  - name: 利益剰余金配当倍率
    field: retained_earnings_div_ratio
    direction: high
    threshold: 10.0     # 10倍以上で満点（10年分の配当を内部留保で賄える）
    max_score: 10
    weight: 1.0
    available: true
    replaces: roic_minus_wacc
    applies_to: [large_cap, financial]

  - name: ミックス係数（PER×PBR）
    field: mix_coefficient
    direction: low
    threshold: 22.5     # 22.5以下で満点（バフェット目安: PER15×PBR1.5）
    penalty_cap: 90.0   # PER30×PBR3=90 以上は一律0点
    max_score: 10
    weight: 1.5
    available: true
    replaces: net_cash_per
    applies_to: [large_cap, financial]

# ── 動的入れ替えルール ────────────────────────────────────────
#   large_cap（1兆円以上）: roic_minus_wacc→retained_earnings_div_ratio、net_cash_per→mix_coefficient
#   financial（銀行・保険・証券等）: equity_ratio除外、roic→retained、net_cash_per→mix_coefficient
