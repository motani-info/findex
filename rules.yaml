# findex スコアリングルール定義
#
# 【スコアリング方式】
#   生スコア  = min(10, 値 / threshold × 10)   direction: high
#             = min(10, threshold / 値 × 10)   direction: low
#   加重スコア = 生スコア × weight
#   合計      = Σ(加重スコア) / max_weighted_total × 100
#
# 【Nullポリシー】
#   データ取得不可（None）→ 生スコア 0（ペナルティ。分母からは除外しない）
#
# 【重み設計思想】（高配当株投資における重要度）
#   配当継続性 > 配当余力 > 事業の質 > 割安度
#   max_weighted_total = 145点 → 100点換算
#
# 【ルール変更時の運用】
#   - weight / threshold のみ変更 → findex rescore（API再取得不要）
#   - 指標の追加・入れ替え       → findex run（API再取得が必要）
#   - 変更のたびに rule_versions テーブルに自動スナップショット

rules:

  # ── カテゴリー1: 配当の安定性 ──────────────────────────────────
  - name: 連続非減配年数
    field: consecutive_no_cut_years
    direction: high
    threshold: 17       # 17年以上で満点（リーマン耐性）
    max_score: 10
    weight: 2.0         # 【最重要】リーマン・コロナ耐性の最高証拠
    available: true

  # ── カテゴリー2: 増配実績 ─────────────────────────────────────
  - name: 連続増配年数
    field: consecutive_dividend_growth_years
    direction: high
    threshold: 17
    max_score: 10
    weight: 1.5         # 経営陣の能動的な増配コミットメント
    available: true

  - name: 5年増配率CAGR
    field: dividend_growth_5y_cagr
    direction: high
    threshold: 0.30     # 30%以上で満点
    max_score: 10
    weight: 1.0         # ①②と情報重複あり。複利加速度として参考
    available: true

  # ── カテゴリー3: 増配余力 ─────────────────────────────────────
  - name: 予想配当性向
    field: payout_ratio
    direction: low
    threshold: 0.35     # 35%以下で満点（利益半減でも無配にならない水準）
    max_score: 10
    weight: 1.5         # 配当の安全余白。最重要クラスの財務指標
    available: true

  - name: EPS成長率5年
    field: eps_growth_5y
    direction: high
    threshold: 0.20     # 20%以上で満点
    max_score: 10
    weight: 1.0         # 配当原資の成長性。yfinanceの1年値はノイズ多め
    available: true

  # ── カテゴリー4: 財務健全性 ───────────────────────────────────
  - name: 自己資本比率
    field: equity_ratio
    direction: high
    threshold: 0.80     # 80%以上で満点
    max_score: 10
    weight: 1.2         # 財務の要塞度。倒産リスクを十分フィルタする閾値
    available: true

  - name: 有利子負債比率
    field: debt_to_equity
    direction: low
    threshold: 0.10     # 10%以下で満点（実質無借金）
    max_score: 10
    weight: 0.8         # ⑥自己資本比率の補完。借入依存度の確認
    available: true     # yfinance BSから計算（EDINET実装後に精度向上）

  # ── カテゴリー5: 競争優位性 ───────────────────────────────────
  - name: ROE（自己資本利益率）
    field: roe
    direction: high
    threshold: 0.20     # 20%以上で満点
    max_score: 10
    weight: 1.2         # 自己資本の収益効率。増配パワーの源泉
    available: true

  - name: ROIC-WACC
    field: roic_minus_wacc
    direction: high
    threshold: 0.10     # 10%以上で満点（超過リターン）
    max_score: 10
    weight: 1.3         # 最も理論的な付加価値指標。持続的増配の根拠
    available: true

  - name: 営業利益率
    field: operating_margin
    direction: high
    threshold: 0.20     # 20%以上で満点
    max_score: 10
    weight: 1.0         # 価格決定力・競争優位の代理指標
    available: true

  # ── カテゴリー6: 割安度 ────────────────────────────────────────
  - name: 配当利回り
    field: div_yield
    direction: high
    threshold: 0.045    # 4.5%以上で満点
    max_score: 10
    weight: 1.2         # 現在の受取リターン。高利回り罠を避け過剰評価しない
    available: true

  - name: ネットキャッシュPER（実質PER）
    field: net_cash_per
    direction: low
    threshold: 10.0     # 10倍以下で満点
    max_score: 10
    weight: 0.8         # 割安度の精緻指標。計算精度への依存を考慮して控えめに
    available: true     # yfinance BSから計算（投資有価証券は省略した簡易版）

  # ── 代替指標: 大型株・金融株向け ─────────────────────────────
  - name: 利益剰余金配当倍率
    field: retained_earnings_div_ratio
    direction: high
    threshold: 10.0     # 10倍以上で満点（10年分の配当を内部留保で賄える）
    max_score: 10
    weight: 1.3         # ⑨ROIC-WACCの代替。同じ重みを適用
    available: true
    replaces: roic_minus_wacc
    applies_to: [large_cap, financial]

  - name: ミックス係数（PER×PBR）
    field: mix_coefficient
    direction: low
    threshold: 22.5     # 22.5以下で満点（バフェット目安: PER15×PBR1.5）
    max_score: 10
    weight: 0.8         # ⑫ネットキャッシュPERの代替。同じ重みを適用
    available: true
    replaces: net_cash_per
    applies_to: [large_cap, financial]


# ── 満点内訳（通常銘柄 145点 → 100点換算）──────────────────────
# ① 10 × 2.0 = 20点
# ② 10 × 1.5 = 15点
# ③ 10 × 1.0 = 10点
# ④ 10 × 1.5 = 15点
# ⑤ 10 × 1.0 = 10点
# ⑥ 10 × 1.2 = 12点
# ⑦ 10 × 0.8 =  8点
# ⑧ 10 × 1.2 = 12点
# ⑨ 10 × 1.3 = 13点   ← 大型株・金融株では⑬に入れ替え
# ⑩ 10 × 1.0 = 10点
# ⑪ 10 × 1.2 = 12点
# ⑫ 10 × 0.8 =  8点   ← 大型株・金融株では⑭に入れ替え
# ───────────────
# 合計最大    145点（入れ替え後も同じ。weightが同一のため）


# ── 動的入れ替えルール ────────────────────────────────────────
# 銘柄分類の判定:
#   large_cap:  market_cap >= 1,000,000,000,000（1兆円）
#   financial:  sector in ["銀行業", "保険業", "証券・商品先物取引業",
#                          "その他金融業", "保険業"]
#
# large_cap_rules（時価総額1兆円以上）:
#   ⑨ roic_minus_wacc → ⑬ retained_earnings_div_ratio
#   ⑫ net_cash_per    → ⑭ mix_coefficient
#
# financial_rules（銀行・保険・証券等）:
#   ⑥ equity_ratio    → ⑦ debt_to_equity   （業種特性上、自己資本比率が低く算出される）
#   ⑨ roic_minus_wacc → ⑬ retained_earnings_div_ratio
#   ⑫ net_cash_per    → ⑭ mix_coefficient
